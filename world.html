<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nocturne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+SC:wght@300;400;600&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ════════ DETAIL ════════ -->
<div id="detail" class="page active">

  <div class="detail-topbar">
    <button class="back-btn" onclick="history.back()">← Nocturne</button>
    <div class="topbar-name" id="d-topname"></div>
    <div class="topbar-num" id="d-topnum"></div>
  </div>

  <!-- 角色 + 画廊 -->
  <div class="d-sec" id="sec-cg">
    <div class="sec-lbl">CHARACTER · GALLERY</div>
    <div class="cg-grid">
      <div class="char-stack" id="d-chars"></div>
      <div class="gal-wrap">
        <div class="gal-grid" id="d-gallery"></div>
        <button class="gal-more-btn" id="gal-more-btn" onclick="galModalOpen()">Gallery →</button>
      </div>
    </div>
  </div>

  <!-- 视频 + 小说 -->
  <div class="d-sec" id="sec-vn">
    <div class="sec-lbl">HANDWRITING · NOVEL</div>
    <div class="vn-grid">

      <div class="vid-wrap">
        <div class="vid-frame" id="d-vframe">
          <div class="vid-ph"><div class="vi">▷</div><p>VIDEO<br>PLACEHOLDER</p></div>
        </div>
        <div class="vid-info">
          <span class="v-t" id="d-vtitle">手书</span>
          <span class="v-d" id="d-vdate">—</span>
        </div>
      </div>

      <div class="nv-wrap">
        <div class="nv-head">
          <span class="nv-title" id="d-nvtitle">—</span>
          <span class="nv-pg" id="d-nvpg">01 / 01</span>
        </div>
        <div class="nv-body" id="d-nvbody"></div>
        <div class="nv-foot">
          <button class="nvbtn" id="nvprev" onclick="nvFlip(-1)">← PREV</button>
          <div class="nv-dots" id="nvdots"></div>
          <button class="nvbtn" id="nvnext" onclick="nvFlip(1)">NEXT →</button>
        </div>
      </div>

    </div>
  </div>

  <!-- 对话 -->
  <div class="d-sec" id="sec-chat">
    <div class="sec-lbl">DIALOGUE</div>

    <div class="chat-outer">

      <!-- 左：悠葉 -->
      <div class="game-side game-side-left" id="game-btn-0" onclick="bjOpen(0)">
        <div class="game-side-icon">♠</div>
        <div class="game-side-label">与老板<br>玩一局</div>
        <div class="game-side-sub">21 POINT</div>
      </div>

      <!-- 对话框 -->
      <div class="chat-wrap">
        <div class="chat-tabs" id="d-ctabs"></div>
        <div class="chat-box">
          <div class="chat-hd">
            <div class="chat-av" id="d-cav">—</div>
            <div>
              <div class="chat-cn" id="d-cname">—</div>
              <div class="chat-cr" id="d-crole">—</div>
            </div>
            <div class="chat-ol">ONLINE</div>
          </div>
          <div class="chat-msgs" id="d-msgs"></div>
          <div class="chat-input-row">
            <textarea class="chat-ta" id="d-input" rows="1"
              placeholder="Say something…"
              onkeydown="ckEnter(event)"
              oninput="autoR(this)"></textarea>
            <button class="chat-send" id="d-send" onclick="doChat()">↑</button>
          </div>
        </div>
      </div>

      <!-- 右：乱数 -->
      <div class="game-side game-side-right" id="game-btn-1" onclick="bjOpen(1)">
        <div class="game-side-icon">♦</div>
        <div class="game-side-label">与乱数<br>玩一局</div>
        <div class="game-side-sub">21 POINT</div>
      </div>

    </div>
  </div>

  <div style="height:100px"></div>
</div>

<!-- ════════ MUSIC PLAYER ════════ -->
<div id="mp">
  <div class="mp-panel" id="mp-panel">
    <div class="mp-tname" id="mp-tname">—</div>
    <div class="mp-tart" id="mp-tart">—</div>
    <div class="mp-prog" id="mp-prog" onclick="mpSeek(event)">
      <div class="mp-fill" id="mp-fill"></div>
    </div>
    <div class="mp-ctrls">
      <button class="mpb" onclick="mpPrev()">⏮</button>
      <button class="mp-pp" id="mp-pp" onclick="mpToggle()">▶</button>
      <button class="mpb" onclick="mpNext()">⏭</button>
      <button class="mpb" onclick="mpTogglePl()">≡</button>
    </div>
    <div class="mp-list" id="mp-list">
      <div id="pl-items"></div>
    </div>
  </div>
  <button class="mp-fab" id="mp-fab" onclick="mpTogglePanel()">♪</button>
</div>

<!-- ════════ BLACKJACK MODAL ════════ -->
<div id="bj-modal" onclick="bjModalBgClick(event)">
  <div class="bj-modal-inner" id="bj-modal-inner">

    <!-- 关闭 -->
    <button class="bj-x" onclick="bjClose()">✕</button>

    <!-- 赌桌主体 -->
    <div class="bj-table">

      <!-- ── 庄家区 ── -->
      <div class="bj-dealer-zone">
        <!-- 立绘区（后期放图） -->
        <div class="bj-char-portrait" id="bj-char-portrait">
          <div class="bj-char-placeholder" id="bj-char-placeholder">
            <div class="bj-char-av" id="bj-char-av">—</div>
            <div class="bj-char-nm" id="bj-char-nm">—</div>
          </div>
        </div>
        <!-- 庄家台词 -->
        <div class="bj-speech" id="bj-speech">
          <span id="bj-speech-text">—</span>
        </div>
        <!-- 庄家牌 -->
        <div class="bj-hand-label">庄家 <span class="bj-score" id="bj-dealer-score"></span></div>
        <div class="bj-hand" id="bj-dealer-hand"></div>
      </div>

      <!-- ── 桌面中线 ── -->
      <div class="bj-felt-mid">
        <div class="bj-deck-area">
          <div class="bj-deck" id="bj-deck">
            <div class="bj-deck-card"></div>
            <div class="bj-deck-card"></div>
            <div class="bj-deck-card"></div>
          </div>
          <div class="bj-deck-label">DECK</div>
        </div>
        <div class="bj-result-area">
          <div class="bj-result" id="bj-result"></div>
        </div>
        <!-- 筹码下注区 -->
        <div class="bj-bet-display">
          BET <span id="bj-bet-val">0</span> &nbsp;|&nbsp; CHIPS <span id="bj-chips-val">1000</span>
        </div>
      </div>

      <!-- ── 玩家区 ── -->
      <div class="bj-player-zone">
        <div class="bj-hand" id="bj-player-hand"></div>
        <div class="bj-hand-label">你 <span class="bj-score" id="bj-player-score"></span></div>

        <!-- 筹码选择 -->
        <div class="bj-chips" id="bj-chips">
          <button class="bj-chip c5"   onclick="bjBet(5)">5</button>
          <button class="bj-chip c25"  onclick="bjBet(25)">25</button>
          <button class="bj-chip c50"  onclick="bjBet(50)">50</button>
          <button class="bj-chip c100" onclick="bjBet(100)">100</button>
          <button class="bj-chip c500" onclick="bjBet(500)">500</button>
        </div>

        <!-- 操作按钮 -->
        <div class="bj-actions" id="bj-actions">
          <button class="bj-btn" id="bj-deal-btn"     onclick="bjDeal()">发牌 DEAL</button>
          <button class="bj-btn" id="bj-hit-btn"      onclick="bjHit()"   style="display:none">要牌 HIT</button>
          <button class="bj-btn" id="bj-stand-btn"    onclick="bjStand()" style="display:none">停牌 STAND</button>
          <button class="bj-btn" id="bj-double-btn"   onclick="bjDouble()" style="display:none">双倍 DOUBLE</button>
          <button class="bj-btn" id="bj-split-btn"    onclick="bjSplit()"  style="display:none">分牌 SPLIT</button>
          <button class="bj-btn" id="bj-insure-btn"   onclick="bjInsure()" style="display:none">保险 INSURANCE</button>
          <button class="bj-btn bj-btn-new" id="bj-new-btn" onclick="bjNewRound()" style="display:none">新一局 NEW ROUND</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ════════ GALLERY MODAL ════════ -->
<div id="gal-modal">
  <div class="gal-modal-head">
    <div class="gal-modal-title" id="gal-modal-title">画廊</div>
    <button class="gal-modal-close" onclick="galModalClose()">✕ CLOSE</button>
  </div>
  <div class="gal-masonry" id="gal-masonry"></div>
</div>

<!-- ════════ LIGHTBOX ════════ -->
<div id="lb" onclick="lbClose()">
  <button class="lb-x">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<audio id="aud"></audio>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
